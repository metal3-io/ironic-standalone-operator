name: Scheduled Link Check

on:
  workflow_dispatch:
  schedule:
  - cron: "0 0 15 * *"
  repository_dispatch:
    # run manually
    types: [check-links]

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    timeout-minutes: 5
    uses: metal3-io/project-infra/.github/workflows/scheduled-link-check.yml@main # zizmor: ignore[unpinned-uses]
