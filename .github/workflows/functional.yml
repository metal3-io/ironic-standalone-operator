name: Functional Tests

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out (branch, tag or SHA). Defaults to the calling workflow ref.'
        type: string
        default: ${{ github.ref }}
      fail-fast:
        description: 'Cancel all in-progress matrix jobs if any job fails'
        type: boolean
        default: true

permissions: {}

jobs:
  test:
    runs-on: oracle-vm-4cpu-16gb-x86-64
    permissions:
      checks: write
      contents: read
    env:
      CLUSTER_TYPE: minikube
      LOGDIR: /tmp/logs
      JUNIT_OUTPUT: /tmp/logs/report.xml
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        include:
        - name: "regular"
          label_filter: "!upgrade && !ha"
          minikube_args: ""
        - name: "upgrade"
          label_filter: "upgrade && !ha"
          minikube_args: ""
        - name: "ha"
          label_filter: "ha"
          minikube_args: "--ha"
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Calculate go version
      id: vars
      run: echo "go_version=$(make go-version)" >> $GITHUB_OUTPUT
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ steps.vars.outputs.go_version }}
    - name: Setup a minikube cluster
      uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
      with:
        start-args: "${{ matrix.minikube_args }}"
    - name: Prepare tests
      run: ./test/prepare.sh
    - name: Run tests
      run: ./test/run.sh
      env:
        LABEL_FILTER: "${{ matrix.label_filter }}"
    - name: Collect logs
      run: ./test/collect-logs.sh
      if: always()
    - name: Upload logs artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: functional-${{ matrix.name }}
        path: /tmp/logs/*
      if: always()
    - name: Annotate failures
      uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
      with:
        annotate_only: true
        report_paths: /tmp/logs/report.xml
      if: always()
