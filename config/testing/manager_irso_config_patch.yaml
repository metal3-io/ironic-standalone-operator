apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: FEATURE_GATES
          value: HighAvailability=true,Overrides=true
        - name: IPA_BASEURI
          value: IRSO_IPA_BASEURI
